services:
  api:
    build: .
    container_name: dq_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://dq_executor:${DQ_EXECUTOR_PASSWORD}@postgres:5432/${POSTGRES_DB}
      METADATA_DATABASE_URL: postgresql+asyncpg://dq_app:${DQ_APP_PASSWORD}@postgres:5432/${POSTGRES_DB}
      STATEMENT_TIMEOUT_MS: 15000
      # --- Platform Intelligence (Manjunath Patil) ---
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      RULE_SUGGESTION_BACKEND: ${RULE_SUGGESTION_BACKEND:-heuristic}
      PROFILING_ROW_LIMIT: ${PROFILING_ROW_LIMIT:-100000}
      ANOMALY_CONTAMINATION: ${ANOMALY_CONTAMINATION:-0.05}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      PREFECT_SERVER_EPHEMERAL_ENABLED: "false"
    ports:
      - "8000:8000"

  scheduler:
    build: .
    container_name: dq_scheduler
    command: python -m app.daemon.scheduler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://dq_executor:${DQ_EXECUTOR_PASSWORD}@postgres:5432/${POSTGRES_DB}
      METADATA_DATABASE_URL: postgresql+asyncpg://dq_app:${DQ_APP_PASSWORD}@postgres:5432/${POSTGRES_DB}
      STATEMENT_TIMEOUT_MS: 15000
      RULE_EXECUTION_JITTER_SECONDS: ${RULE_EXECUTION_JITTER_SECONDS:-120}

  platform_scheduler:
    build: .
    container_name: dq_platform_scheduler
    command: python -m app.platform.orchestration.task_scheduler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://dq_executor:${DQ_EXECUTOR_PASSWORD}@postgres:5432/${POSTGRES_DB}
      METADATA_DATABASE_URL: postgresql+asyncpg://dq_app:${DQ_APP_PASSWORD}@postgres:5432/${POSTGRES_DB}
      STATEMENT_TIMEOUT_MS: 15000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      RULE_SUGGESTION_BACKEND: ${RULE_SUGGESTION_BACKEND:-heuristic}
      PROFILING_ROW_LIMIT: ${PROFILING_ROW_LIMIT:-100000}
      ANOMALY_CONTAMINATION: ${ANOMALY_CONTAMINATION:-0.05}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      PIPELINE_EXECUTION_JITTER_SECONDS: ${PIPELINE_EXECUTION_JITTER_SECONDS:-120}
      PREFECT_SERVER_EPHEMERAL_ENABLED: "false"

  postgres:
    image: postgres:16
    container_name: dq_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DQ_EXECUTOR_PASSWORD: ${DQ_EXECUTOR_PASSWORD}
      DQ_APP_PASSWORD: ${DQ_APP_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dq_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
